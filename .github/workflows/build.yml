name: Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-build.txt

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --name "Notenrechner-win"
          --add-data "database;database"
          --add-data "calculation;calculation"
          --collect-data customtkinter
          main.py

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Notenrechner-win.exe

  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-build.txt

      - name: Build app bundle
        run: >
          pyinstaller
          --windowed
          --name "Notenrechner"
          --add-data "database:database"
          --add-data "calculation:calculation"
          --collect-data customtkinter
          main.py

      - name: Zip app bundle
        run: cd dist && zip -r Notenrechner-mac.zip Notenrechner.app

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Notenrechner-mac.zip
